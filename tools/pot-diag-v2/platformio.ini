[env:pot-diag-v2]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Memory: N8R16 = 8MB QIO flash + 16MB OPI PSRAM (same as main firmware,
; so we exercise the real hw context)
board_build.arduino.memory_type = qio_opi

build_unflags =
  -DARDUINO_USB_MODE=1

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCONFIG_TINYUSB_DESC_MANUFACTURER_STRING=\"ILLPAD\"
  -DCONFIG_TINYUSB_DESC_PRODUCT_STRING=\"ILLPAD48\ POTDIAG\"

lib_deps =
  robtillaart/MCP_ADC
  adafruit/Adafruit NeoPixel
  h2zero/NimBLE-Arduino@^1.4.3

monitor_speed = 115200
