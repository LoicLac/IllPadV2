; PlatformIO Project Configuration File
; ILLPAD 48 — 48-pad capacitive MIDI controller
; Board: ESP32-S3-N8R16 (8MB flash, 16MB OPI PSRAM)
;
; USB: Single USB-C on GPIO 19/20 (native USB, no UART bridge)
;   TinyUSB composite device: USB MIDI + CDC Serial + upload + VT100
;   The DevKitC-1 board has a 2nd USB-C (COM/UART bridge on GPIO 43/44)
;   but it is NOT used in ILLPAD — everything goes through native USB.
;   JTAG builtin shares GPIO 19/20 — cannot coexist with TinyUSB.
;
; Environment:
;   esp32-s3-devkitc-1  = Full application

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Memory: N8R16 = 8MB QIO flash + 16MB OPI PSRAM
board_build.arduino.memory_type = qio_opi

build_unflags =
  -DARDUINO_USB_MODE=1

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; TinyUSB USB descriptor strings (what the host OS shows)
  ; Escape spaces so the compiler sees proper C string literals
  -DCONFIG_TINYUSB_DESC_MANUFACTURER_STRING=\"ILLPAD\"
  -DCONFIG_TINYUSB_DESC_PRODUCT_STRING=\"ILLPAD48\ USB\"

; Exclude the pot_diag sketch so it does not pollute the main build
build_src_filter = +<*> -<pot_diag/>

lib_deps =
  max22/ESP32-BLE-MIDI
  adafruit/Adafruit NeoPixel
  robtillaart/MCP_ADC

monitor_speed = 115200


; =================================================================
; POT DIAG v2 — MCP3208 + 5 pots + runtime load simulation
; DESACTIVE — decommente le bloc ci-dessous pour reactiver le sketch diag.
; Le code source dans src/pot_diag/ reste en place (ignore via build_src_filter
